<!DOCTYPE html>
<html>
<head>
<title>Player Registration</title>
<link rel="stylesheet" href="style.css">
</head>
<style>
    /* REGISTRATION PAGE */

body{

    min-height:100vh;

    background:
    radial-gradient(circle at top,#ff7a00,#050505 55%);

    font-family:'Poppins',sans-serif;

    display:flex;

    flex-direction:column;

    justify-content:center;

    align-items:center;

    color:white;

    gap:30px;

}


/* MAIN TITLE */

h1{

    font-family:'Orbitron',sans-serif;
    color:#ffb000;
    text-align:center;
    letter-spacing:3px;
    text-shadow:
    0 0 10px #ff7a00,
    0 0 30px #ff7a00;

}


/* FORM BOX */

form{

    width:380px;
    padding:35px;

    background:rgba(0,0,0,0.75);

    border:2px solid #ff9800;

    border-radius:20px;

    box-shadow:

    0 0 25px #ff9800,
    inset 0 0 20px #222;

}


/* INPUTS */

input{

    width:100%;

    padding:15px;

    margin:12px 0;

    border:none;

    outline:none;

    border-radius:10px;

    background:#111;

    color:white;

    font-size:16px;

    border:1px solid #555;

    transition:.3s;

}



input:focus{

    border-color:#ff9800;

    box-shadow:

    0 0 15px #ff9800;

}



/* FILE INPUT */

input[type="file"]{

    background:#222;

}



/* BUTTON */

button{


    width:100%;

    padding:15px;

    margin-top:20px;

    border:none;

    border-radius:30px;

    background:

    linear-gradient(45deg,#ff4500,#ffb000);

    color:white;

    font-size:18px;

    font-weight:bold;

    cursor:pointer;

    letter-spacing:2px;


    box-shadow:

    0 0 20px #ff9800;


    transition:.3s;

}



button:hover{

    transform:scale(1.05);

    box-shadow:

    0 0 40px #ff9800;

}



/* MOBILE */
@media(max-width:500px){

body{

    padding:15px;

    gap:25px;

}


h1{

    font-size:30px;

    margin:0;

}



form{

    width:90%;

    max-width:420px;

    padding:40px 30px;

}



input{

    width:100%;

    padding:16px;

    font-size:16px;

    margin:14px 0;

}



button{

    padding:16px;

    font-size:18px;

}



.back-home{

    padding:14px;

    font-size:15px;

}

}

.back-home{

    display:block;

    text-align:center;

    margin-top:20px;

    padding:12px;

    border-radius:25px;

    text-decoration:none;

    color:white;

    border:2px solid #ff9800;

    font-weight:bold;

    letter-spacing:1px;

    transition:.3s;

}


.back-home:hover{

    background:#ff9800;

    box-shadow:
    0 0 25px #ff9800;

    transform:scale(1.05);

}

</style>
<body>


<h1>FREEFIREXIPL REGISTRATION</h1>


<form action="http://localhost:3000/register" method="POST" enctype="multipart/form-data">


<input type="text" name="playerName" placeholder="Player Name" required>


<input type="text" name="ffid" placeholder="Free Fire ID Name" required>


<input type="number" name="level" placeholder="Free Fire Level" required>


<input type="file" name="screenshot" required>


<button type="submit">
REGISTER
</button>

<a href="index.html" class="back-home">
← BACK TO HOME
</a>


</form>


</body>
</html>
