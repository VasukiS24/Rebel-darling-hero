<!DOCTYPE html>
<html>

<head>

<title>Admin Login</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<style>

body{

background:#050505;
color:white;
font-family:Arial;

height:100vh;

display:flex;
justify-content:center;
align-items:center;

}


.box{

background:#111;

padding:30px;

border:2px solid orange;

border-radius:20px;

text-align:center;

box-shadow:0 0 25px orange;

}


h1{

color:orange;

}


input{

padding:15px;

width:250px;

border:none;

border-radius:10px;

background:#222;

color:white;

margin:15px;

}



button{

padding:15px 30px;

border:none;

border-radius:25px;

background:orange;

color:white;

font-weight:bold;

cursor:pointer;

}


</style>


</head>


<body>


<div class="box">


<h1>🔐 ADMIN LOGIN</h1>


<input 
type="password" 
id="password"
placeholder="Enter Password">



<br>


<button onclick="checkPassword()">

LOGIN

</button>



</div>



<script>


function checkPassword(){


let pass =
document.getElementById("password").value;



if(pass === "FFXIPL2026REBEL"){


window.location.href="admin.html";


}


else{


alert("Wrong Password ❌");


}



}



</script>



</body>


</html>
